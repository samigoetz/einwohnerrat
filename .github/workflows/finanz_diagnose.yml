name: Finanz-Diagnose

# Nur manuell startbar. Laedt die echten Jahresrechnungen 2024 und 2025,
# strukturiert sie und zeigt, ob die Kontrollsummen aufgehen.
# Aendert keine Dateien der Website.
on:
  workflow_dispatch:

jobs:
  finanz-diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Repository holen
        uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install pdfplumber

      - name: Jahresrechnungen strukturieren und pruefen
        run: python finanz_extraktor.py --diagnose
