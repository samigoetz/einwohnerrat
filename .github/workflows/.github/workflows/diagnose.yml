name: Diagnose BFS-Struktur

# Nur manuell startbar. Schreibt die echten Dimensionen und Werttexte
# der Kennzahlen-Wuerfel ins Protokoll, damit die Auswahl punktgenau
# statt geraten erfolgen kann. Aendert keine Dateien.
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Repository holen
        uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install requests beautifulsoup4 pypdf

      - name: BFS-Struktur auslesen
        run: python neuhausen_daten.py --diagnose-stattab
