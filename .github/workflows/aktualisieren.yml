name: Daten aktualisieren

on:
  schedule:
    - cron: "*/15 * * * *"  # alle 15 Minuten
  workflow_dispatch:        # erlaubt manuelles Starten per Knopf

permissions:
  contents: write

# Nie zwei Laeufe gleichzeitig (wichtig, weil der allererste Lauf
# wegen der Volltext-Erfassung lange dauert)
concurrency:
  group: daten-aktualisieren
  cancel-in-progress: false

jobs:
  aktualisieren:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Repository holen
        uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Texterkennung installieren
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-deu poppler-utils

      - name: Abhaengigkeiten installieren
        run: pip install requests beautifulsoup4 pypdf

      - name: Daten von neuhausen.ch holen
        run: python neuhausen_daten.py

      - name: Neue Daten speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add neuhausen_daten.js feed.xml volltext.js
          git diff --staged --quiet || git commit -m "Daten aktualisiert"
          git push
