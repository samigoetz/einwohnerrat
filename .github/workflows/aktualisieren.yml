name: Daten aktualisieren

on:
  schedule:
    - cron: "7 * * * *"     # stuendlich (Minute 7, entzerrt die Last)
  workflow_dispatch:        # erlaubt manuelles Starten per Knopf

permissions:
  contents: write

# Nie zwei gleichartige Laeufe gleichzeitig. Manuelle Starts bekommen eine
# EIGENE Gruppe, damit sie nicht mit den Viertelstunden-Laeufen um denselben
# Platz konkurrieren. Vorher wurde ein wartender manueller Lauf regelmaessig
# vom naechsten automatischen Lauf verdraengt ("canceled").
concurrency:
  group: daten-aktualisieren-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  aktualisieren:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Repository holen
        uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install requests beautifulsoup4 pypdf pdfplumber openpyxl

      # SCHRITT 1: Website-Daten holen (schnell, ~30 Sekunden) OHNE die
      # Kennzahlen. Diese Daten sind das Wichtigste und werden sofort
      # danach gespeichert, damit sie auch dann ankommen, wenn der
      # Kennzahlen-Teil spaeter scheitert oder der Runner abgeschaltet wird.
      - name: Daten von neuhausen.ch holen
        run: python neuhausen_daten.py --ohne-kennzahlen

      - name: Website-Daten sofort speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add neuhausen_daten.js feed.xml presse_archiv.js
          if git diff --staged --quiet; then
            echo "Keine Aenderungen an den Website-Daten"
          else
            git commit -m "Daten aktualisiert"
            for versuch in 1 2 3; do
              git push && break
              echo "Push abgewiesen, hole Fremdaenderungen ($versuch)"
              mkdir -p /tmp/f1
              for f in neuhausen_daten.js feed.xml presse_archiv.js; do
                [ -f "$f" ] && cp "$f" "/tmp/f1/$f"
              done
              git fetch origin main && git reset --hard origin/main
              for f in neuhausen_daten.js feed.xml presse_archiv.js; do
                [ -f "/tmp/f1/$f" ] && cp "/tmp/f1/$f" "$f"
              done
              git add neuhausen_daten.js feed.xml presse_archiv.js
              git diff --staged --quiet && break
              git commit -m "Daten aktualisiert"
            done
          fi

      # SCHRITT 2: Kennzahlen. Laeuft getrennt; scheitert er, sind die
      # Website-Daten oben bereits sicher im Repository.
      - name: Kennzahlen holen
        continue-on-error: true
        env:
          KENNZAHLEN_MINUTEN: "8"
        run: python neuhausen_daten.py --nur-kennzahlen

      - name: Kennzahlen speichern
        # Laeuft AUCH, wenn der Datenlauf abgebrochen ist. Dank der
        # Zwischensicherung im Skript sind dann die bis dahin geholten
        # Daten vorhanden und werden uebernommen. Ohne dieses "always()"
        # waere alles verloren.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATEIEN="kennzahlen.js neuhausen_daten.js feed.xml presse_archiv.js"
          git add $DATEIEN
          git diff --staged --quiet && echo "Keine Aenderungen" && exit 0
          git commit -m "Daten aktualisiert"

          # Waehrend eines Laufs koennen Dateien hochgeladen worden sein.
          # Dann weist GitHub den Push ab. Wir holen die Fremdaenderungen
          # und setzen anschliessend unsere frisch berechneten Datendateien
          # erneut, damit sie in jedem Fall gewinnen (sie sind aktueller).
          for versuch in 1 2 3; do
            if git push; then
              echo "Push erfolgreich (Versuch $versuch)"
              exit 0
            fi
            echo "Push abgewiesen, hole Fremdaenderungen (Versuch $versuch)"
            # Unsere Fassung der Datendateien sichern
            mkdir -p /tmp/frisch
            for f in $DATEIEN; do
              [ -f "$f" ] && cp "$f" "/tmp/frisch/$(basename $f)"
            done
            # Auf den Fernstand zuruecksetzen (verwirft unseren Commit,
            # die Dateien haben wir gesichert)
            git fetch origin main
            git reset --hard origin/main
            # Frische Daten zurueckschreiben und neu committen
            for f in $DATEIEN; do
              [ -f "/tmp/frisch/$(basename $f)" ] && cp "/tmp/frisch/$(basename $f)" "$f"
            done
            git add $DATEIEN
            if git diff --staged --quiet; then
              echo "Nach Abgleich keine Aenderungen mehr noetig"
              exit 0
            fi
            git commit -m "Daten aktualisiert"
          done
          echo "Push nach drei Versuchen nicht moeglich"
          exit 1
